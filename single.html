<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mode Gelap dan Terang</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Website Mode Gelap dan Terang</h1>
        <button id="toggle-dark-mode">Toggle Mode</button>
    </header>

    <main>
        <p>Ini adalah contoh website yang memiliki fitur mode gelap dan terang.</p>
    </main>

    <script>
        // Cek local storage untuk preferensi mode sebelumnya
        if (localStorage.getItem('mode') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        // Dapatkan elemen tombol
        const toggleButton = document.getElementById('toggle-dark-mode');

        // Tambahkan event listener untuk tombol
        toggleButton.addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');

            // Simpan preferensi pengguna ke local storage
            if (document.body.classList.contains('dark-mode')) {
                localStorage.setItem('mode', 'dark');
            } else {
                localStorage.setItem('mode', 'light');
            }
        });
    </script>

</body>
</html>
